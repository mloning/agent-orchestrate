# Codex CLI hooks — inline TOML form, merge into ~/.codex/config.toml.
#
# Prefer the installer (scripts/install-codex-hooks.sh) which writes the
# equivalent ~/.codex/hooks.json. This inline form is the alternative for people
# who keep everything in config.toml. Codex loads BOTH a hooks.json and inline
# [hooks] tables in the same layer and warns — use only one representation.
#
# The `hooks` feature is stable and on by default. Non-managed hooks require a
# trust review on the next `codex` launch, or they won't run.
#
# Note the array-of-tables shape: each event is `[[hooks.<Event>]]` with a
# nested `[[hooks.<Event>.hooks]]` handler (matcher optional for these events).
# `--type` tags the agent kind; `2>/dev/null || true` keeps it fire-and-forget.

[[hooks.UserPromptSubmit]]
[[hooks.UserPromptSubmit.hooks]]
type = "command"
command = "agentq status RUNNING --type codex 2>/dev/null || true"

[[hooks.PermissionRequest]]
[[hooks.PermissionRequest.hooks]]
type = "command"
command = "agentq status WAITING_APPROVAL --type codex 2>/dev/null || true"

# PostToolUse fires after any approved tool executes — the signal that resumes a
# WAITING_APPROVAL answered in Codex's own pane (no "granted" hook exists), so
# the dashboard row clears back to RUNNING without waiting on the watcher.
[[hooks.PostToolUse]]
[[hooks.PostToolUse.hooks]]
type = "command"
command = "agentq status RUNNING --type codex 2>/dev/null || true"

[[hooks.Stop]]
[[hooks.Stop.hooks]]
type = "command"
command = "agentq status IDLE --type codex 2>/dev/null || true"

# Turn-end topic summary: `agentq summarize` spawns a detached `claude -p` worker
# and returns at once, computing the pane's stable @agent_topic once per session.
[[hooks.Stop]]
[[hooks.Stop.hooks]]
type = "command"
command = "agentq summarize --type codex 2>/dev/null || true"
