# agentq — tmux keybinding configuration
# Source this from ~/.tmux.conf:
#   source-file ~/Dev/projects/agent-orchestrate/tmux/agent-orchestrate.conf
#
# prefix + i toggles between work and the agentq dashboard (FR5/FR8).
# The dashboard session is lazily created on first summon.
bind-key i run-shell "agentq open"
